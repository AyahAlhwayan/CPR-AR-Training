<!DOCTYPE html>
<html>
  <head>
    <title>CPR AR Training</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      .ui-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        text-align: center;
        width: 90%;
      }
      .btn {
        padding: 15px 25px;
        font-size: 18px;
        background: #e91e63;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
      .instruction-card {
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px;
        border-radius: 15px;
        margin-bottom: 10px;
        font-family: Arial, sans-serif;
        font-size: 1.1em;
      }
      .step-counter {
        color: #ffeb3b;
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div class="ui-container">
      <div class="instruction-card">
        <span id="step-label" class="step-counter">STEP 1</span>
        <div id="text-info">Make sure the area is safe for you and the victim</div>
      </div>
      <button class="btn" onclick="nextStep()">Next Step →</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro">
        
        <a-entity id="group1">
            <a-cone color="#4CAF50" radius-bottom="0.1" height="0.3" position="0 0.5 0" rotation="180 0 0"></a-cone>
            <a-text value="Safety First" align="center" position="0 0.8 0" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group2" visible="false">
            <a-cone color="yellow" radius-bottom="0.05" height="0.2" position="-0.3 0.3 -0.5"></a-cone>
            <a-text value="Are you okay?" align="center" position="-0.3 0.6 -0.5" scale="0.5 0.5 0.5"></a-text>
            <a-ring color="white" radius-inner="0.1" radius-outer="0.12" position="0.3 0.1 -0.3" rotation="-90 0 0"></a-ring>
            <a-text value="Tap shoulder" align="center" position="0.3 0.4 -0.3" scale="0.5 0.5 0.5"></a-text>
        </a-entity>

        <a-entity id="group3" visible="false">
            <a-sphere color="blue" radius="0.1" position="0 0.2 -1"></a-sphere>
            <a-text value="Forehead & Chin" align="center" position="0 0.5 -1" scale="0.5 0.5 0.5"></a-text>
        </a-entity>

        <a-entity id="group4" visible="false">
            <a-box color="orange" width="0.2" height="0.05" depth="0.2" position="0 0.1 -0.7"></a-box>
            <a-text value="Check Breathing" align="center" position="0 0.4 -0.7" scale="0.5 0.5 0.5"></a-text>
        </a-entity>

        <a-entity id="group5" visible="false">
            <a-ring color="red" radius-inner="0.15" radius-outer="0.2" position="0 0.1 -0.5" rotation="-90 0 0"></a-ring>
            <a-text value="30 Compressions" align="center" position="0 0.5 -0.5" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group6" visible="false">
            <a-cone color="cyan" radius-bottom="0.1" height="0.3" position="0 0.4 -1" rotation="180 0 0"></a-cone>
            <a-text value="Give 2 Breaths" align="center" position="0 0.8 -1" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      let currentStep = 1;
      const stepsText = [
        "Make sure the area is safe for you and the victim",
        "Call out loudly: Are you okay? & Tap the shoulder gently",
        "Place hand on forehead & Lift the chin gently",
        "Look for chest movement & Listen for breathing (10 sec)",
        "Place heel of hand, other hand on top. Push 30 times (5cm deep)",
        "Tilt head back, close nose, and give 2 breaths"
      ];

      function nextStep() {
        // Hide current group
        document.getElementById('group' + currentStep).setAttribute('visible', 'false');
        
        // Increment step or reset
        currentStep = (currentStep % 6) + 1;
        
        // Show next group
        document.getElementById('group' + currentStep).setAttribute('visible', 'true');
        
        // Update UI Text
        document.getElementById('step-label').innerText = "STEP " + currentStep;
        document.getElementById('text-info').innerText = stepsText[currentStep - 1];
      }
    </script>
  </body>
</html>
