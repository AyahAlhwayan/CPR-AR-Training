<!DOCTYPE html>
<html>
  <head>
    <title>CPR AR Advanced Platform v3.0</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      :root {
        --primary-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        --accent: #00f2fe;
        --emergency-red: #ff0000;
        --success-green: #00ff88;
      }

      body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }

      /* Landing Page */
      #landing-page {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--primary-gradient); z-index: 3000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; text-align: center; transition: 0.8s;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
        border-radius: 30px; padding: 40px; width: 85%; max-width: 500px;
        border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      }

      .start-btn {
        background: var(--accent); color: #000; padding: 18px 50px; border: none;
        border-radius: 50px; font-weight: bold; font-size: 1.3rem; cursor: pointer;
        margin-top: 30px; box-shadow: 0 0 20px var(--accent); transition: 0.3s;
      }

      /* AR UI Overlay */
      #ar-ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1000; display: none; pointer-events: none;
      }

      .progress-container {
        position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
        width: 85%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px;
      }

      #progress-bar {
        width: 16.6%; height: 100%; background: var(--accent);
        border-radius: 10px; transition: 0.8s ease; box-shadow: 0 0 15px var(--accent);
      }

      .instruction-panel {
        position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 90%; pointer-events: auto;
      }

      .info-box {
        background: rgba(0,0,0,0.85); color: white; padding: 25px;
        border-radius: 25px; border-top: 4px solid var(--accent); margin-bottom: 20px;
        backdrop-filter: blur(10px);
      }

      .controls { display: flex; justify-content: space-between; gap: 15px; }
      
      .btn {
        flex: 1; padding: 18px; border-radius: 50px; border: none;
        color: white; font-weight: bold; cursor: pointer; font-size: 1rem;
      }
      .btn-next { background: var(--emergency-red); box-shadow: 0 5px 15px rgba(255,0,0,0.4); }
      .btn-reset { background: #333; }

      #cpr-counter {
        font-size: 4rem; color: #ffeb3b; font-weight: bold; display: none;
        text-shadow: 0 0 20px rgba(255,235,59,0.8); margin-bottom: 10px;
      }
    </style>
  </head>

  <body>

    <div id="landing-page">
      <div class="glass-card">
        <h1 style="letter-spacing: 2px;">CPR AR MISSION</h1>
        <p style="opacity: 0.8;">Emergency Response Simulation Platform</p>
        <div style="text-align: left; font-size: 0.95rem; line-height: 1.8; margin: 25px 0;">
          <p>🔹 Align <b>Hiro Marker</b> beside mannequin.</p>
          <p>🔹 Follow <b>Laser-guided</b> visual cues.</p>
          <p>🔹 Maintain <b>Vital Flow</b> through compressions.</p>
        </div>
        <button class="start-btn" onclick="initExperience()">ACTIVATE AR</button>
      </div>
    </div>

    <div id="ar-ui">
      <div class="progress-container"><div id="progress-bar"></div></div>
      
      <div class="instruction-panel">
        <div id="cpr-counter">0</div>
        <div class="info-box">
          <small id="step-num" style="color: var(--accent); font-weight: bold; letter-spacing: 1px;">Step 1 of 6</small>
          <div id="text-info" style="font-size: 1.2rem; margin-top: 5px;">Scanning for safe perimeter...</div>
        </div>
        <div class="controls">
          <button class="btn btn-reset" onclick="location.reload()">RESTART</button>
          <button class="btn btn-next" onclick="nextStep()">CONTINUE →</button>
        </div>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      <a-marker preset="hiro">
        
        <a-entity id="group1">
          <a-cone color="#00ff88" radius-bottom="0.1" height="0.3" position="0 0.5 0" rotation="180 0 0"
                  animation="property: position; to: 0 0.7 0; dir: alternate; dur: 800; loop: true"></a-cone>
          <a-text value="SAFE AREA" align="center" position="0 1 0" scale="0.8 0.8 0.8" color="#00ff88"></a-text>
        </a-entity>

        <a-entity id="group2" visible="false">
          <a-sphere color="yellow" radius="0.12" position="-0.4 0.3 -0.5"
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 400; loop: true"></a-sphere>
          <a-text value="CHECK RESPONSE" align="center" position="-0.4 0.7 -0.5" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group3" visible="false">
          <a-torus color="#00f2fe" radius="0.1" radius-tubular="0.01" position="0 0.3 -1" rotation="90 0 0"></a-torus>
          <a-text value="AIRWAY OPEN" align="center" position="0 0.6 -1" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group4" visible="false">
          <a-box color="#ff8800" position="0 0.1 -0.7" scale="0.2 0.2 0.2"
                 animation="property: rotation; to: 0 360 0; dur: 3000; loop: true"></a-box>
          <a-text value="MONITOR BREATH" align="center" position="0 0.5 -0.7" scale="0.6 0.6 0.6"></a-text>
        </a-entity>

        <a-entity id="group5" visible="false">
          <a-ring color="#ff0000" radius-inner="0.18" radius-outer="0.22" position="0 0.1 -0.5" rotation="-90 0 0"
                  animation="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 545; loop: true; dir: alternate"></a-ring>
          
          <a-plane position="0.6 0.5 -0.5" rotation="0 -30 0" width="0.5" height="0.7" color="#000" opacity="0.8">
            <a-text value="VITAL DASHBOARD" align="center" position="0 0.25 0.01" scale="0.3 0.3 0.3" color="#00f2fe"></a-text>
            <a-text value="PULSE: MONITORING" align="center" position="0 0.05 0.01" scale="0.25 0.25 0.25" color="#00ff88"></a-text>
            <a-text value="O2 SAT: 82%" align="center" position="0 -0.1 0.01" scale="0.25 0.25 0.25" color="#ffeb3b"></a-text>
            <a-text value="TARGET: 110 BPM" align="center" position="0 -0.25 0.01" scale="0.2 0.2 0.2" color="#fff"></a-text>
          </a-plane>

          <a-text value="COMPRESS HERE" align="center" position="0 0.8 -0.5" scale="0.7 0.7 0.7" color="#ff0000"></a-text>
        </a-entity>

        <a-entity id="group6" visible="false">
          <a-sphere color="cyan" radius="0.15" position="0 0.3 -1" opacity="0.5"
                    animation="property: scale; from: 1 1 1; to: 1.5 1.5 1.5; dur: 1000; loop: true; dir: alternate"></a-sphere>
          <a-text value="2 RESCUE BREATHS" align="center" position="0 0.8 -1" scale="0.7 0.7 0.7"></a-text>
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      let currentStep = 1;
      let count = 0;
      let metronomeInterval = null;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const stepsText = [
        "Ensure personal and scene safety before approaching.",
        "Assess response: Shake shoulders and call out loudly.",
        "Perform head-tilt, chin-lift to open the airway.",
        "Check breathing: Look, listen, and feel for normal breaths.",
        "Perform 30 compressions. Follow the rhythmic visual and audio cues.",
        "Deliver 2 rescue breaths and continue the cycle."
      ];

      function beep(freq, dur) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      }

      function initExperience() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('landing-page').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('landing-page').style.display = 'none';
          document.getElementById('ar-ui').style.display = 'block';
        }, 800);
      }

      function nextStep() {
        clearInterval(metronomeInterval);
        document.getElementById('cpr-counter').style.display = 'none';

        document.getElementById('group' + currentStep).setAttribute('visible', 'false');
        currentStep = (currentStep % 6) + 1;
        document.getElementById('group' + currentStep).setAttribute('visible', 'true');

        // UI Updates
        document.getElementById('step-num').innerText = `STEP ${currentStep} OF 6`;
        document.getElementById('text-info').innerText = stepsText[currentStep - 1];
        document.getElementById('progress-bar').style.width = (currentStep * 16.6) + '%';

        if (currentStep === 5) {
          startCPR();
        }
      }

      function startCPR() {
        count = 0;
        document.getElementById('cpr-counter').style.display = 'block';
        document.getElementById('cpr-counter').innerText = count;
        
        // 110 BPM = approx 545ms interval
        metronomeInterval = setInterval(() => {
          count++;
          if (count <= 30) {
            document.getElementById('cpr-counter').innerText = count;
            beep(900, 0.08); 
          } else {
            document.getElementById('cpr-counter').innerText = "BREATH!";
            clearInterval(metronomeInterval);
          }
        }, 545);
      }
    </script>
  </body>
</html>
